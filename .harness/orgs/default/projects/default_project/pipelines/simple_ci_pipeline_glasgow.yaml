pipeline:
  name: simple_ci_pipeline_glasgow
  identifier: simple_ci_pipeline_glasgow
  projectIdentifier: default_project
  orgIdentifier: default
  tags: {}
  properties:
    ci:
      codebase:
        connectorRef: account.account_level_github_connector_glasgow
        repoName: mission4
        build: <+input>
  stages:
    - stage:
        name: build stage
        identifier: build_stage
        description: ""
        type: CI
        spec:
          cloneCodebase: true
          caching:
            enabled: true
            override: true
          buildIntelligence:
            enabled: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: account.stuartbuild_farm_connector_glasgow
              namespace: harness-delegate-ng
              automountServiceAccountToken: true
              nodeSelector: {}
              os: Linux
          execution:
            steps:
              - step:
                  type: Run
                  name: Run Script
                  identifier: Run_Script
                  spec:
                    connectorRef: account.account_level_dockerhub_connector_glasgow
                    image: bash
                    shell: Sh
                    command: sh run.sh
